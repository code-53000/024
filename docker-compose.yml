services:
  mysql:
    image: mysql:8.0
    container_name: mineral-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mineral123
      MYSQL_DATABASE: mineral_db
      MYSQL_USER: mineral
      MYSQL_PASSWORD: mineral123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmineral123"]
      interval: 5s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mineral-backend
    restart: unless-stopped
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=mineral123
      - MYSQL_DB=mineral_db
      - SECRET_KEY=mineral-collection-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - TZ=Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  init-db:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mineral-init-db
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=mineral123
      - MYSQL_DB=mineral_db
      - TZ=Asia/Shanghai
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
    command: python init_db.py
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mineral-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  uploads:
