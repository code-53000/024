services:
  mysql:
    image: mysql:8.0
    container_name: mineral-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mineral123
      MYSQL_DATABASE: mineral_db
      MYSQL_USER: mineral
      MYSQL_PASSWORD: mineral123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmineral123"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  mysql_dev_data:
